<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Elevación de cabeza con doble mentón">
  <rect x="0" y="0" width="320" height="200" rx="10" fill="#EEF2F6"/>
  <!-- suelo -->
  <line x1="22" y1="150" x2="298" y2="150" stroke="#C2CCDA" stroke-width="4" stroke-linecap="round"/>
  <g fill="#4E7CA6" stroke="#34506B" stroke-width="2" stroke-linejoin="round">
    <!-- torso supino -->
    <rect x="118" y="126" width="138" height="22" rx="11"/>
    <!-- piernas dobladas -->
    <path d="M256 137 l26 -22 l16 26" fill="none" stroke="#34506B" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- cabeza levantada con doble mentón -->
    <circle cx="100" cy="116" r="18"/>
    <path d="M84 122 l-11 5 l12 5 z"/>
  </g>
  <!-- nuca / hueco respecto al suelo -->
  <path d="M118 134 q-14 4 -22 -2" fill="none" stroke="#1E8A7A" stroke-width="3" stroke-linecap="round"/>
  <!-- distancia 2-3 cm -->
  <line x1="100" y1="136" x2="100" y2="148" stroke="#D4831A" stroke-width="2" stroke-dasharray="3 3"/>
  <path d="M96 138 h8 M96 146 h8" stroke="#D4831A" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="170" font-family="DM Sans, sans-serif" font-size="10" fill="#9A6512" text-anchor="middle">2–3 cm</text>
  <text x="168" y="100" font-family="DM Sans, sans-serif" font-size="11" fill="#1E8A7A" text-anchor="middle">mantén el doble mentón</text>
  <text x="168" y="190" font-family="DM Sans, sans-serif" font-size="10" fill="#9A6512" text-anchor="middle">el mentón no se adelanta</text>
</svg>
