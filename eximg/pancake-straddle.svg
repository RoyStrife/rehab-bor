<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pancake — estiramiento en straddle">
  <rect x="0" y="0" width="320" height="200" rx="10" fill="#EEF2F6"/>
  <!-- suelo -->
  <line x1="20" y1="150" x2="300" y2="150" stroke="#C2CCDA" stroke-width="3" stroke-linecap="round"/>
  <!-- anclaje de la banda al frente -->
  <rect x="34" y="120" width="14" height="30" rx="3" fill="#C2CCDA"/>
  <text x="41" y="190" font-family="DM Sans, sans-serif" font-size="9" fill="#7E8AA0" text-anchor="middle">anclaje</text>
  <!-- piernas abiertas en V (vista cenital esquemática) -->
  <g stroke="#34506B" stroke-width="11" stroke-linecap="round">
    <path d="M196 132 L264 104"/>
    <path d="M196 132 L264 160"/>
  </g>
  <g fill="#4E7CA6" stroke="#34506B" stroke-width="2" stroke-linejoin="round">
    <!-- cadera -->
    <circle cx="196" cy="132" r="13"/>
    <!-- torso inclinado al frente con espalda RECTA -->
    <path d="M188 126 L120 112" stroke="#4E7CA6" stroke-width="18" stroke-linecap="round"/>
    <!-- cabeza -->
    <circle cx="112" cy="110" r="12"/>
    <!-- brazos hacia la banda -->
    <path d="M122 112 L66 128" stroke="#34506B" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- banda elástica (tracción) -->
  <path d="M64 128 L48 132" stroke="#C98A3A" stroke-width="4" stroke-linecap="round" stroke-dasharray="5 3"/>
  <!-- línea de espalda recta (cue) -->
  <path d="M120 104 L186 122" fill="none" stroke="#1E8A7A" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="150" y="92" font-family="DM Sans, sans-serif" font-size="11" fill="#1E8A7A" text-anchor="middle">espalda recta</text>
  <text x="170" y="190" font-family="DM Sans, sans-serif" font-size="10" fill="#9A6512" text-anchor="middle">inclina desde la cadera · no redondear la lumbar</text>
</svg>
