<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apertura torácica con disco">
  <rect x="0" y="0" width="320" height="200" rx="10" fill="#EEF2F6"/>
  <!-- suelo -->
  <line x1="20" y1="168" x2="300" y2="168" stroke="#C2CCDA" stroke-width="3" stroke-linecap="round"/>
  <!-- foam roller -->
  <ellipse cx="96" cy="128" rx="16" ry="16" fill="#C2CCDA" stroke="#9BA9BB" stroke-width="2"/>
  <text x="96" y="190" font-family="DM Sans, sans-serif" font-size="9" fill="#7E8AA0" text-anchor="middle">foam roller</text>
  <!-- figura de rodillas, glúteos a talones, brazos overhead sobre el rodillo -->
  <g fill="#4E7CA6" stroke="#34506B" stroke-width="2" stroke-linejoin="round">
    <!-- cadera/glúteos atrás (sobre talones) -->
    <circle cx="210" cy="150" r="15"/>
    <!-- torso inclinado hacia el rodillo -->
    <path d="M200 142 L120 120" stroke="#4E7CA6" stroke-width="20" stroke-linecap="round"/>
    <!-- cabeza cayendo entre los brazos -->
    <circle cx="108" cy="118" r="13"/>
    <!-- brazos extendidos al rodillo -->
    <path d="M120 120 L98 126" stroke="#34506B" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- disco -->
  <ellipse cx="92" cy="128" rx="6" ry="13" fill="#C98A3A" stroke="#9A6512" stroke-width="2"/>
  <!-- arco de extensión torácica (cue) -->
  <path d="M128 112 q34 -22 70 18" fill="none" stroke="#1E8A7A" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 0"/>
  <text x="166" y="96" font-family="DM Sans, sans-serif" font-size="11" fill="#1E8A7A" text-anchor="middle">extensión torácica</text>
  <text x="166" y="190" font-family="DM Sans, sans-serif" font-size="10" fill="#9A6512" text-anchor="middle">abre el pecho · lumbar neutra</text>
</svg>
