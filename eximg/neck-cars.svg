<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neck CARs — movilidad cervical controlada">
  <rect x="0" y="0" width="320" height="200" rx="10" fill="#EEF2F6"/>
  <!-- hombros -->
  <path d="M120 184 q40 -30 80 0" fill="none" stroke="#C2CCDA" stroke-width="16" stroke-linecap="round"/>
  <!-- cabeza -->
  <circle cx="160" cy="92" r="26" fill="#4E7CA6" stroke="#34506B" stroke-width="2"/>
  <!-- flecha circular de control (rango seguro) -->
  <path d="M160 50 a42 42 0 1 0 34 18" fill="none" stroke="#1E8A7A" stroke-width="3" stroke-linecap="round"/>
  <path d="M160 50 l-10 -4 l3 11 z" fill="#1E8A7A"/>
  <!-- zona a respetar: extensión + rotación atrás -->
  <path d="M196 64 a42 42 0 0 1 6 28" fill="none" stroke="#D4831A" stroke-width="3" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="250" y="80" font-family="DM Sans, sans-serif" font-size="9" fill="#9A6512" text-anchor="middle">no forzar</text>
  <text x="250" y="92" font-family="DM Sans, sans-serif" font-size="9" fill="#9A6512" text-anchor="middle">atrás</text>
  <text x="160" y="190" font-family="DM Sans, sans-serif" font-size="10" fill="#1E8A7A" text-anchor="middle">lento y controlado · rango sin dolor</text>
</svg>
