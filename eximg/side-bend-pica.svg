<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inclinación lateral con pica">
  <rect x="0" y="0" width="320" height="200" rx="10" fill="#EEF2F6"/>
  <!-- línea vertical de referencia (centro) -->
  <line x1="160" y1="30" x2="160" y2="186" stroke="#C2CCDA" stroke-width="2" stroke-dasharray="4 4"/>
  <!-- cadera estable -->
  <ellipse cx="160" cy="168" rx="20" ry="12" fill="#9FB3C6" stroke="#7E97AC" stroke-width="2"/>
  <!-- figura inclinada lateralmente hacia la derecha -->
  <g fill="#4E7CA6" stroke="#34506B" stroke-width="2" stroke-linejoin="round">
    <!-- tronco inclinado -->
    <path d="M160 162 L196 96" stroke="#4E7CA6" stroke-width="22" stroke-linecap="round"/>
    <!-- cabeza -->
    <circle cx="202" cy="84" r="14"/>
    <!-- brazos overhead estirados con la pica -->
    <path d="M196 96 L172 60" stroke="#34506B" stroke-width="7" stroke-linecap="round"/>
    <path d="M196 96 L214 56" stroke="#34506B" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- pica overhead -->
  <line x1="166" y1="56" x2="220" y2="50" stroke="#6B5640" stroke-width="5" stroke-linecap="round"/>
  <!-- estiramiento costado opuesto (izquierdo) -->
  <path d="M150 150 q-14 -34 16 -66" fill="none" stroke="#1E8A7A" stroke-width="3" stroke-dasharray="3 3" stroke-linecap="round"/>
  <text x="92" y="104" font-family="DM Sans, sans-serif" font-size="11" fill="#1E8A7A" text-anchor="middle">estira el</text>
  <text x="92" y="118" font-family="DM Sans, sans-serif" font-size="11" fill="#1E8A7A" text-anchor="middle">costado opuesto</text>
  <text x="160" y="196" font-family="DM Sans, sans-serif" font-size="10" fill="#9A6512" text-anchor="middle">espalda recta · sin rotar · lumbar neutra</text>
</svg>
