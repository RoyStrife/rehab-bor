<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Estiramiento del trapecio superior">
  <rect x="0" y="0" width="320" height="200" rx="10" fill="#EEF2F6"/>
  <!-- figura sentada de frente -->
  <g fill="#4E7CA6" stroke="#34506B" stroke-width="2" stroke-linejoin="round">
    <!-- torso -->
    <rect x="134" y="118" width="56" height="62" rx="14"/>
    <!-- cabeza inclinada hacia la derecha -->
    <circle cx="180" cy="88" r="22"/>
  </g>
  <!-- hombro contrario fijado hacia abajo (ancla) -->
  <path d="M134 130 q-22 10 -24 34" fill="none" stroke="#34506B" stroke-width="9" stroke-linecap="round"/>
  <circle cx="110" cy="168" r="7" fill="#C98A3A" stroke="#9A6512" stroke-width="2"/>
  <path d="M104 178 v8 M116 178 v8" stroke="#9A6512" stroke-width="2" stroke-linecap="round"/>
  <text x="96" y="160" font-family="DM Sans, sans-serif" font-size="9" fill="#9A6512" text-anchor="middle">hombro abajo</text>
  <!-- mano que acompaña la cabeza -->
  <path d="M192 74 q18 -8 28 4" fill="none" stroke="#34506B" stroke-width="9" stroke-linecap="round"/>
  <rect x="214" y="72" width="16" height="14" rx="5" fill="#C98A3A" stroke="#9A6512" stroke-width="2"/>
  <!-- flecha de inclinación lateral -->
  <path d="M166 64 q20 -12 38 -2" fill="none" stroke="#1E8A7A" stroke-width="3" stroke-linecap="round"/>
  <path d="M204 62 l3 10 l-10 -1 z" fill="#1E8A7A"/>
  <text x="206" y="50" font-family="DM Sans, sans-serif" font-size="11" fill="#1E8A7A" text-anchor="middle">oreja al hombro</text>
  <text x="160" y="194" font-family="DM Sans, sans-serif" font-size="10" fill="#9A6512" text-anchor="middle">estiramiento suave · sin tirón</text>
</svg>
